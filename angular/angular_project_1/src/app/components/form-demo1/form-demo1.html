<h3 class="text-center">Let's Learn Form Classes</h3>

<form name='myForm'>
  Name:
  <input name='uname' [(ngModel)]='name' required /><br><br>
  Age:
  <input name='uage' [(ngModel)]='age' />
</form>


<style>
  input.ng-valid{
    border: 5px solid green;
  }
  input.ng-invalid{
    border: 5px solid red;
  }
</style>
