<h3 class="text-center">Product List</h3>

<div class="container">
  <div class="row">
    <div class="col-sm-2">
      <select (change)="categoryChanged($event)" class="form-control">
        @for (category of categorySet; track $index) {
        <option>{{category}}</option>
        }
      </select>
    </div>
    <div class="col-sm-6">
      <input class="form-control" type="search" placeholder="Search..." />
    </div>
    <div class="col-sm-4">
      <button class="btn btn-primary">Sort Asc</button>
      <button class="btn btn-secondary mx-1">Sort Desc</button>
    </div>
  </div>
  <div class="row mt-2">
    @for (product of productArr | paginate: { itemsPerPage: 4, currentPage: p}; track $index) {
    <div class="col-sm-3">
      <div class="card">
        <img src="{{product.image}}" class="card-img-top" alt="..." height="200">
        <div class="card-body text-center">
          <h5 class="card-title">{{product.category}}</h5>
          <p class="card-text">{{product.id}}</p>
          <p class="card-text text-truncate">{{product.title}}</p>
          <p class="card-text text-truncate">{{product.description}}</p>
          <p class="card-text">{{product.price}}</p>
          <p class="card-text">
            {{product.rating.rate}}
            <fa-icon [icon]='faStar'></fa-icon>
          </p>
        </div>
      </div>
    </div>
    }@empty {
    <div>No Products Found</div>
    }
  </div>
  <div class="row mt-1">
    <div class="col-sm-5 offset-3">
      <pagination-controls (pageChange)="p = $event"></pagination-controls>
    </div>
  </div>
</div>
