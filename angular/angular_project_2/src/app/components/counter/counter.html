<h3 class="text-center">Counter Example using NgRx</h3>

<div class="border border-3 rounded-3 p-3  col-sm-4 offset-4">
  <h2>Count value is : {{count$ | async}}</h2>
  <button (click)="decrement()">Decrement</button>
  <button (click)="reset()" class="mx-2">Reset</button>
  <button (click)="increment()">Increment</button>
</div>
